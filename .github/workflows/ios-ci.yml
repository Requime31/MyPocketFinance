# CI через Fastlane: `bundle exec fastlane ci` (см. fastlane/Fastfile).

name: iOS CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ios-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (iOS Simulator)
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 26.3
        run: sudo xcode-select -s /Applications/Xcode_26.3.app/Contents/Developer

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler: "2.4.22"
          bundler-cache: true

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Fastlane ci
        env:
          DERIVED_DATA_PATH: ${{ runner.temp }}/DerivedData
        run: bundle exec fastlane ci
