name: iOS CD (practice — simulator artifact)

on:
  workflow_dispatch:
  push:
    tags:
      - 'practice-*'

jobs:
  distribute-simulator-build:
    name: Release build + artifact
    runs-on: macos-15
    env:
      BUNDLE_FORCE_RUBY_PLATFORM: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 26.3
        run: sudo xcode-select -s /Applications/Xcode_26.3.app/Contents/Developer

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3.10"
          bundler: "2.4.22"
          bundler-cache: true

      - name: Fastlane artifact_simulator_release
        env:
          DERIVED_DATA_PATH: ${{ runner.temp }}/DerivedData
        run: bundle exec fastlane artifact_simulator_release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MyPocketFinance-simulator-release
          path: MyPocketFinance-simulator-release.zip
          retention-days: 14
